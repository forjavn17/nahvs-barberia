<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#E8500A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>FeriaControl</title>
<style>
:root{
  --orange:#E8500A;--od:#c44208;--og:rgba(232,80,10,.18);
  --green:#27AE60;--red:#E74C3C;--gold:#F39C12;
  --dark:#1A1A2E;--mid:#16213E;--card:#0F3460;--light:#1a4a80;
  --silver:#94A3B8;--white:#F8FAFC;
  --r:18px;--rs:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;user-select:none}
button,input,select,textarea{font-family:inherit}

/* ── HEADER ── */
.app-header{background:var(--mid);padding:14px 16px max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:50}
.app-logo{font-size:20px;font-weight:800;color:var(--orange);letter-spacing:-.5px}
.app-logo span{color:var(--white)}
.total-badge{background:var(--orange);color:#fff;font-size:13px;font-weight:800;padding:6px 14px;border-radius:30px;display:flex;align-items:center;gap:5px}
.total-badge .total-num{font-size:16px}

/* ── NAV TABS ── */
.nav-tabs{display:flex;background:var(--mid);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-tab{flex:1;padding:11px 4px;text-align:center;font-size:11px;font-weight:600;color:var(--silver);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-tab.active{color:var(--orange);border-color:var(--orange)}
.nav-tab-ico{font-size:19px}

/* ── PAGES ── */
.page{display:none;padding:14px;padding-bottom:30px;max-width:480px;margin:0 auto}
.page.on{display:block}

/* ── PRODUCT GRID ── */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prod-btn{background:var(--card);border-radius:var(--r);border:2px solid rgba(255,255,255,.06);cursor:pointer;transition:transform .15s,box-shadow .15s;overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent}
.prod-btn:active{transform:scale(.94)}
.prod-btn.sold-flash{animation:soldFlash .45s ease}
@keyframes soldFlash{0%,100%{border-color:rgba(255,255,255,.06)}50%{border-color:var(--green);box-shadow:0 0 20px rgba(39,174,96,.5)}}
.prod-btn.plan-orange{border-color:rgba(232,80,10,.3)}
.prod-btn.plan-red{border-color:rgba(231,76,60,.35);opacity:.8}
.prod-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--light)}
.prod-img-ph{width:100%;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:var(--light);color:var(--silver)}
.prod-img-ph span{font-size:32px;opacity:.5}
.prod-body{padding:10px}
.prod-name{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-price{font-size:18px;font-weight:800;color:var(--orange);margin-bottom:5px}
.prod-stock{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-block}
.stock-ok{background:rgba(39,174,96,.15);color:var(--green)}
.stock-low{background:rgba(243,156,18,.15);color:var(--gold)}
.stock-zero{background:rgba(231,76,60,.15);color:var(--red)}
.prod-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--red);letter-spacing:.5px;border-radius:calc(var(--r) - 2px)}
/* botón agregar producto */
.add-prod-btn{background:rgba(232,80,10,.1);border:2px dashed rgba(232,80,10,.35);border-radius:var(--r);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--orange);font-size:13px;font-weight:600;aspect-ratio:initial;min-height:160px;transition:all .2s}
.add-prod-btn:hover,.add-prod-btn:active{background:rgba(232,80,10,.18)}
.add-prod-btn span{font-size:32px}

/* ── RESUMEN ── */
.summary-header{background:linear-gradient(135deg,var(--orange),#f07020);border-radius:var(--r);padding:20px;margin-bottom:14px;text-align:center}
.summary-header h2{font-size:15px;font-weight:600;opacity:.85;margin-bottom:4px}
.summary-total{font-size:42px;font-weight:800;line-height:1}
.summary-sub{font-size:13px;opacity:.8;margin-top:6px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:var(--rs);padding:14px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.stat-n{font-size:26px;font-weight:800;color:var(--orange)}
.stat-l{font-size:11px;color:var(--silver);margin-top:3px}
.sec-title{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--silver);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.ventas-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.venta-row{background:var(--card);border-radius:var(--rs);padding:10px 13px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,255,255,.06)}
.venta-row-name{font-size:13px;font-weight:600}
.venta-row-meta{font-size:11px;color:var(--silver);margin-top:1px}
.venta-row-price{font-size:14px;font-weight:800;color:var(--green)}
.btn-cerrar{width:100%;background:var(--orange);color:#fff;border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(232,80,10,.4)}
.btn-cerrar:active{transform:scale(.97)}
.btn-secondary{width:100%;background:rgba(255,255,255,.06);color:var(--silver);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);padding:12px;font-size:14px;cursor:pointer;margin-top:8px;transition:all .2s}
.empty-state{text-align:center;padding:50px 20px;color:var(--silver)}
.empty-state .ei{font-size:52px;margin-bottom:12px}
.empty-state h3{font-size:16px;color:var(--white);margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.5}

/* ── STOCK PAGE ── */
.stock-list{display:flex;flex-direction:column;gap:8px}
.stock-row{background:var(--card);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.06)}
.stock-thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;background:var(--light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.stock-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.stock-info{flex:1;min-width:0}
.stock-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-price{font-size:12px;color:var(--orange);font-weight:600}
.stock-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.stock-qty{font-size:22px;font-weight:800;color:var(--white);line-height:1}
.stock-actions{display:flex;gap:5px}
.sqbtn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sqbtn.plus{background:rgba(39,174,96,.2);color:var(--green)}
.sqbtn.minus{background:rgba(231,76,60,.15);color:var(--red)}
.sqbtn:active{transform:scale(.88)}
.sqbtn.del{background:rgba(231,76,60,.12);color:var(--red);width:28px;height:28px;font-size:13px}

/* ── FORM / MODAL ── */
.ov{display:none;position:fixed;inset:0;background:rgba(5,10,20,.88);backdrop-filter:blur(8px);z-index:200;align-items:flex-end;justify-content:center}
.ov.on{display:flex;animation:fdi .2s ease}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:480px;background:var(--mid);border-radius:22px 22px 0 0;padding:20px 16px max(20px,env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:slu .28s cubic-bezier(.34,1.3,.64,1);scrollbar-width:none}
.modal::-webkit-scrollbar{display:none}
@keyframes slu{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-hdr h2{font-size:18px;font-weight:800}
.btn-x{background:rgba(255,255,255,.08);border:none;color:var(--silver);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--silver);letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px}
.fg input,.fg select{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);padding:12px 14px;color:#fff;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fg input::placeholder{color:var(--silver)}
.fg input:focus,.fg select:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--og)}
.fg select option{background:var(--mid)}
.photo-pick{border:2px dashed rgba(255,255,255,.15);border-radius:var(--rs);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;background:rgba(255,255,255,.03)}
.photo-pick:hover{border-color:var(--orange)}
.photo-pick input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-pick-ph{padding:22px;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--silver);text-align:center;pointer-events:none}
.photo-pick-ph span{font-size:28px;opacity:.5}
.photo-pick-ph p{font-size:13px}
.photo-preview-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:9px}
.btn-pub{width:100%;background:var(--orange);color:#fff;border:none;border-radius:var(--rs);padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(232,80,10,.35);margin-top:5px}
.btn-pub:active{transform:scale(.97)}
.btn-cancel{width:100%;background:rgba(255,255,255,.06);color:var(--silver);border:1px solid rgba(255,255,255,.1);border-radius:var(--rs);padding:12px;font-size:14px;cursor:pointer;margin-top:8px}

/* ── CONFIRM / TOAST ── */
.cfm-ov{display:none;position:fixed;inset:0;background:rgba(5,10,20,.88);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center;padding:20px}
.cfm-ov.on{display:flex;animation:fdi .18s ease}
.cfm-box{background:var(--mid);border-radius:22px;padding:22px;width:100%;max-width:300px;text-align:center;border:1px solid rgba(255,255,255,.08)}
.cfm-box h3{font-size:16px;font-weight:800;margin-bottom:6px}
.cfm-box p{font-size:13px;color:var(--silver);margin-bottom:18px;line-height:1.5}
.cfm-btns{display:flex;gap:9px}
.btn-cfm-n{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--silver);border-radius:var(--rs);padding:11px;font-size:13px;cursor:pointer}
.btn-cfm-y{flex:1;background:var(--red);color:#fff;border:none;border-radius:var(--rs);padding:11px;font-size:13px;font-weight:700;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--mid);border:1px solid rgba(232,80,10,.3);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:all .28s;z-index:500;white-space:nowrap;pointer-events:none;box-shadow:0 4px 18px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ALERTAS LOW STOCK ── */
.alert-banner{display:none;background:rgba(243,156,18,.12);border:1px solid rgba(243,156,18,.3);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;font-size:12px;cursor:pointer;transition:all .2s}
.alert-banner.show{display:flex;align-items:center;gap:8px}
.alert-banner:active{background:rgba(243,156,18,.2)}

/* ── CIERRE FERIA ── */
.cierre-box{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="app-logo">Feria<span>Control</span></div>
  <div class="total-badge">
    💰 <span class="total-num" id="totalDisp">$0</span>
  </div>
</div>

<!-- NAV -->
<div class="nav-tabs">
  <div class="nav-tab active" id="tab-vender" onclick="goTab('vender')">
    <span class="nav-tab-ico">🏷️</span>Vender
  </div>
  <div class="nav-tab" id="tab-stock" onclick="goTab('stock')">
    <span class="nav-tab-ico">📦</span>Stock
  </div>
  <div class="nav-tab" id="tab-resumen" onclick="goTab('resumen')">
    <span class="nav-tab-ico">📊</span>Resumen
  </div>
</div>

<!-- ALERTA STOCK BAJO -->
<div class="alert-banner" id="alertBanner" onclick="goTab('stock')">
  <span style="font-size:18px">⚠️</span>
  <span id="alertMsg">Productos con stock bajo — tocá para ver</span>
</div>

<!-- ══ PÁGINA VENDER ══ -->
<div class="page on" id="pgVender">
  <div class="prod-grid" id="prodGrid"></div>
</div>

<!-- ══ PÁGINA STOCK ══ -->
<div class="page" id="pgStock">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:13px">
    <div style="font-size:15px;font-weight:800">Mis productos</div>
    <button onclick="openForm(null)" style="background:var(--orange);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer">＋ Agregar</button>
  </div>
  <div class="stock-list" id="stockList"></div>
</div>

<!-- ══ PÁGINA RESUMEN ══ -->
<div class="page" id="pgResumen">
  <div class="summary-header">
    <h2 id="resumenFecha">Resumen de hoy</h2>
    <div class="summary-total" id="resumenTotal">$0</div>
    <div class="summary-sub" id="resumenSub">0 ventas · 0 productos distintos</div>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="sec-title">Últimas ventas</div>
  <div class="ventas-list" id="ventasList"></div>
  <div class="sec-title">Ranking del día</div>
  <div class="stock-list" id="rankingList"></div>
  <div style="height:14px"></div>
  <button class="btn-cerrar" onclick="cerrarFeria()">🔒 Cerrar feria y guardar</button>
  <button class="btn-secondary" onclick="compartirResumen()">📲 Compartir por WhatsApp</button>
</div>

<!-- FORM PRODUCTO -->
<div class="ov" id="formOv" onclick="closeForm(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="formTitulo">Nuevo producto</h2>
      <button class="btn-x" onclick="closeForm()">✕</button>
    </div>
    <div class="fg">
      <label>Foto del producto</label>
      <div class="photo-pick" id="photoPick">
        <input type="file" id="photoInput" accept="image/*" onchange="onFoto(this)"/>
        <div id="photoUI">
          <div class="photo-pick-ph">
            <span>📷</span>
            <p>Tocá para sacar o cargar una foto</p>
          </div>
        </div>
      </div>
    </div>
    <div class="fg"><label>Nombre del producto *</label><input type="text" id="fNombre" placeholder="Ej: Remera azul manga corta"/></div>
    <div class="fg"><label>Precio ($) *</label><input type="number" id="fPrecio" placeholder="3500" min="0"/></div>
    <div class="fg"><label>Stock inicial *</label><input type="number" id="fStock" placeholder="10" min="0"/></div>
    <div class="fg">
      <label>Alerta de stock bajo</label>
      <input type="number" id="fAlerta" placeholder="2 (te avisa cuando quedan pocas)" min="0"/>
    </div>
    <button class="btn-pub" onclick="guardarProducto()">💾 Guardar producto</button>
    <button class="btn-cancel" onclick="closeForm()">Cancelar</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="cfm-ov" id="cfmOv">
  <div class="cfm-box">
    <h3 id="cfmTitulo">¿Confirmar?</h3>
    <p id="cfmMsg"></p>
    <div class="cfm-btns">
      <button class="btn-cfm-n" onclick="closeCfm()">Cancelar</button>
      <button class="btn-cfm-y" id="cfmYes">Sí</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
'use strict';

// ═══════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════
var DB = {
  get: function(k, d) { try { var v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } },
  set: function(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { toast('⚠️ Sin espacio de almacenamiento'); } }
};

// ═══════════════════════════════════════
//  ESTADO GLOBAL
// ═══════════════════════════════════════
var productos = DB.get('fc_productos', []);
var ventas    = DB.get('fc_ventas', []);    // ventas del día
var historial = DB.get('fc_historial', []); // ferias cerradas
var editId    = null;
var fotoActual = null;
var currentTab = 'vender';

function saveProductos() { DB.set('fc_productos', productos); }
function saveVentas()    { DB.set('fc_ventas', ventas); }

function nextId() {
  return Date.now() + Math.random().toString(36).slice(2);
}

// ═══════════════════════════════════════
//  FORMATO
// ═══════════════════════════════════════
var fmt = function(n) { return '$' + Number(n).toLocaleString('es-AR'); };

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(function() { el.classList.remove('show'); }, 2200);
}

// ═══════════════════════════════════════
//  VIBRACIÓN + SONIDO AL VENDER
// ═══════════════════════════════════════
function feedbackVenta() {
  if (navigator.vibrate) navigator.vibrate([30, 10, 30]);
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.setValueAtTime(1100, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.start(); o.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

// ═══════════════════════════════════════
//  TOTAL DEL DÍA
// ═══════════════════════════════════════
function calcTotal() {
  return ventas.reduce(function(s, v) { return s + v.precio; }, 0);
}
function updateTotalDisplay() {
  document.getElementById('totalDisp').textContent = fmt(calcTotal());
}

// ═══════════════════════════════════════
//  ALERTAS STOCK BAJO
// ═══════════════════════════════════════
function checkAlertas() {
  var bajos = productos.filter(function(p) {
    var min = p.alerta || 2;
    return p.stock <= min && p.stock > 0;
  });
  var cero = productos.filter(function(p) { return p.stock <= 0; });
  var banner = document.getElementById('alertBanner');
  if (bajos.length || cero.length) {
    var msgs = [];
    if (cero.length) msgs.push(cero.length + ' sin stock');
    if (bajos.length) msgs.push(bajos.length + ' con stock bajo');
    document.getElementById('alertMsg').textContent = '⚠️ ' + msgs.join(' · ') + ' — Tocá para ver';
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

// ═══════════════════════════════════════
//  NAVEGACIÓN
// ═══════════════════════════════════════
function goTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('on'); });
  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('pg' + capitalize(tab)).classList.add('on');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'vender')  renderVender();
  if (tab === 'stock')   renderStock();
  if (tab === 'resumen') renderResumen();
  window.scrollTo(0, 0);
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ═══════════════════════════════════════
//  RENDER: VENDER (pantalla principal)
// ═══════════════════════════════════════
function renderVender() {
  var grid = document.getElementById('prodGrid');
  if (!productos.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--silver)">' +
      '<div style="font-size:52px;margin-bottom:12px">🛍️</div>' +
      '<div style="font-size:16px;color:var(--white);font-weight:700;margin-bottom:6px">Aún no tenés productos</div>' +
      '<div style="font-size:13px;margin-bottom:18px;line-height:1.5">Agregá tus productos desde la pestaña Stock para empezar a vender</div>' +
      '<button onclick="goTab(\'stock\')" style="background:var(--orange);color:#fff;border:none;border-radius:var(--rs);padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer">＋ Agregar primer producto</button>' +
    '</div>';
    return;
  }

  var html = '';
  productos.forEach(function(p) {
    var stockCls = p.stock <= 0 ? 'stock-zero' : p.stock <= (p.alerta || 2) ? 'stock-low' : 'stock-ok';
    var stockTxt = p.stock <= 0 ? 'Sin stock' : 'Stock: ' + p.stock;
    var planCls  = p.stock <= 0 ? 'plan-red' : p.stock <= (p.alerta || 2) ? 'plan-orange' : '';
    var imgHtml  = p.foto
      ? '<img class="prod-img" src="' + p.foto + '" alt="foto" loading="lazy"/>'
      : '<div class="prod-img-ph"><span>' + (p.emoji || '📦') + '</span></div>';
    var overlay  = p.stock <= 0 ? '<div class="prod-overlay">AGOTADO</div>' : '';

    html += '<div class="prod-btn ' + planCls + '" id="pbtn-' + p.id + '" onclick="registrarVenta(\'' + p.id + '\')">' +
      '<div style="position:relative">' + imgHtml + overlay + '</div>' +
      '<div class="prod-body">' +
        '<div class="prod-name">' + p.nombre + '</div>' +
        '<div class="prod-price">' + fmt(p.precio) + '</div>' +
        '<span class="prod-stock ' + stockCls + '">' + stockTxt + '</span>' +
      '</div>' +
    '</div>';
  });

  // botón agregar
  html += '<div class="add-prod-btn" onclick="goTab(\'stock\')">' +
    '<span>＋</span><div>Agregar producto</div>' +
  '</div>';

  grid.innerHTML = html;
}

// ═══════════════════════════════════════
//  REGISTRAR VENTA
// ═══════════════════════════════════════
function registrarVenta(id) {
  var p = productos.find(function(x) { return x.id === id; });
  if (!p) return;
  if (p.stock <= 0) { toast('🚫 ' + p.nombre + ' está agotado'); return; }

  // Descontar stock
  p.stock--;
  saveProductos();

  // Registrar venta
  ventas.push({
    id: nextId(),
    productoId: id,
    nombre: p.nombre,
    precio: p.precio,
    hora: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
  });
  saveVentas();

  // Feedback visual
  var btn = document.getElementById('pbtn-' + id);
  if (btn) { btn.classList.add('sold-flash'); setTimeout(function() { btn.classList.remove('sold-flash'); }, 500); }

  // Feedback sensorial
  feedbackVenta();

  // Actualizar UI
  updateTotalDisplay();
  checkAlertas();
  setTimeout(function() { renderVender(); }, 500);

  toast('✅ ' + p.nombre + ' — ' + fmt(p.precio));
}

// ═══════════════════════════════════════
//  RENDER: STOCK
// ═══════════════════════════════════════
function renderStock() {
  var el = document.getElementById('stockList');
  if (!productos.length) {
    el.innerHTML = '<div class="empty-state"><div class="ei">📦</div><h3>Sin productos cargados</h3><p>Tocá "Agregar" para cargar tu primer producto</p></div>';
    return;
  }
  el.innerHTML = productos.map(function(p) {
    var stockCls = p.stock <= 0 ? 'stock-zero' : p.stock <= (p.alerta || 2) ? 'stock-low' : 'stock-ok';
    var imgHtml  = p.foto
      ? '<img src="' + p.foto + '" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy"/>'
      : (p.emoji || '📦');
    return '<div class="stock-row">' +
      '<div class="stock-thumb">' + imgHtml + '</div>' +
      '<div class="stock-info">' +
        '<div class="stock-name">' + p.nombre + '</div>' +
        '<div class="stock-price">' + fmt(p.precio) + ' · <span class="prod-stock ' + stockCls + '" style="font-size:10px;padding:2px 7px">' + p.stock + ' unid.</span></div>' +
      '</div>' +
      '<div class="stock-right">' +
        '<div class="stock-qty">' + p.stock + '</div>' +
        '<div class="stock-actions">' +
          '<button class="sqbtn minus" onclick="ajustarStock(\'' + p.id + '\',-1)">−</button>' +
          '<button class="sqbtn plus"  onclick="ajustarStock(\'' + p.id + '\',1)">＋</button>' +
          '<button class="sqbtn del"   onclick="editarProducto(\'' + p.id + '\')">✏️</button>' +
          '<button class="sqbtn del"   onclick="confirmarBorrar(\'' + p.id + '\')">🗑️</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function ajustarStock(id, delta) {
  var p = productos.find(function(x) { return x.id === id; });
  if (!p) return;
  p.stock = Math.max(0, p.stock + delta);
  saveProductos();
  renderStock();
  checkAlertas();
}

// ═══════════════════════════════════════
//  RENDER: RESUMEN
// ═══════════════════════════════════════
function renderResumen() {
  var total   = calcTotal();
  var nVentas = ventas.length;
  var prods   = new Set(ventas.map(function(v) { return v.productoId; })).size;
  var ticket  = nVentas > 0 ? Math.round(total / nVentas) : 0;

  var hoy = new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('resumenFecha').textContent = hoy.charAt(0).toUpperCase() + hoy.slice(1);
  document.getElementById('resumenTotal').textContent = fmt(total);
  document.getElementById('resumenSub').textContent = nVentas + ' venta' + (nVentas !== 1 ? 's' : '') + ' · ' + prods + ' producto' + (prods !== 1 ? 's' : '') + ' distintos';

  // Stats cards
  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="stat-n">' + nVentas + '</div><div class="stat-l">Ventas</div></div>' +
    '<div class="stat-card"><div class="stat-n">' + fmt(ticket) + '</div><div class="stat-l">Ticket promedio</div></div>' +
    '<div class="stat-card"><div class="stat-n">' + prods + '</div><div class="stat-l">Productos vendidos</div></div>' +
    '<div class="stat-card"><div class="stat-n">' + historial.length + '</div><div class="stat-l">Ferias cerradas</div></div>';

  // Últimas ventas
  var ultimas = ventas.slice(-8).reverse();
  if (!ultimas.length) {
    document.getElementById('ventasList').innerHTML = '<div class="empty-state" style="padding:25px 0"><div class="ei" style="font-size:32px">🛍️</div><p>Aún no hay ventas hoy</p></div>';
  } else {
    document.getElementById('ventasList').innerHTML = ultimas.map(function(v) {
      return '<div class="venta-row">' +
        '<div><div class="venta-row-name">' + v.nombre + '</div><div class="venta-row-meta">' + v.hora + '</div></div>' +
        '<div class="venta-row-price">' + fmt(v.precio) + '</div>' +
      '</div>';
    }).join('');
  }

  // Ranking
  var ranking = {};
  ventas.forEach(function(v) {
    if (!ranking[v.productoId]) ranking[v.productoId] = { nombre: v.nombre, qty: 0, total: 0 };
    ranking[v.productoId].qty++;
    ranking[v.productoId].total += v.precio;
  });
  var rankArr = Object.values(ranking).sort(function(a, b) { return b.qty - a.qty; }).slice(0, 5);
  if (!rankArr.length) {
    document.getElementById('rankingList').innerHTML = '<p style="font-size:13px;color:var(--silver);text-align:center;padding:10px 0">Sin datos aún</p>';
  } else {
    document.getElementById('rankingList').innerHTML = rankArr.map(function(r, i) {
      var medal = ['🥇','🥈','🥉','4️⃣','5️⃣'][i];
      return '<div class="stock-row">' +
        '<div style="font-size:22px;width:36px;text-align:center;flex-shrink:0">' + medal + '</div>' +
        '<div class="stock-info"><div class="stock-name">' + r.nombre + '</div><div class="stock-price">' + fmt(r.total) + ' total</div></div>' +
        '<div style="font-family:monospace;font-size:22px;font-weight:800;color:var(--orange)">' + r.qty + '</div>' +
      '</div>';
    }).join('');
  }
}

// ═══════════════════════════════════════
//  CERRAR FERIA
// ═══════════════════════════════════════
function cerrarFeria() {
  if (!ventas.length) { toast('⚠️ No hay ventas para cerrar'); return; }
  var total = calcTotal();
  document.getElementById('cfmTitulo').textContent = '¿Cerrar la feria?';
  document.getElementById('cfmMsg').textContent = 'Se guardará el resumen de ' + ventas.length + ' ventas por ' + fmt(total) + '. Las ventas del día se limpian para empezar de nuevo.';
  document.getElementById('cfmYes').textContent = 'Cerrar feria';
  document.getElementById('cfmYes').onclick = function() {
    historial.push({
      fecha: new Date().toLocaleDateString('es-AR'),
      ventas: ventas.slice(),
      total: total
    });
    DB.set('fc_historial', historial);
    ventas = [];
    saveVentas();
    closeCfm();
    updateTotalDisplay();
    renderResumen();
    checkAlertas();
    toast('🎉 Feria cerrada. Total: ' + fmt(total));
  };
  document.getElementById('cfmOv').classList.add('on');
}

function compartirResumen() {
  var total   = calcTotal();
  var nVentas = ventas.length;
  var hoy     = new Date().toLocaleDateString('es-AR');
  var top     = {};
  ventas.forEach(function(v) {
    if (!top[v.nombre]) top[v.nombre] = 0;
    top[v.nombre]++;
  });
  var topArr  = Object.entries(top).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  var msg = '📊 *Resumen FeriaControl - ' + hoy + '*\n\n' +
    '💰 Total: *' + fmt(total) + '*\n' +
    '🛍️ Ventas: ' + nVentas + '\n';
  if (topArr.length) {
    msg += '\n🏆 Más vendido:\n' + topArr.map(function(x){return '  • ' + x[0] + ': ' + x[1] + ' unid.';}).join('\n');
  }
  msg += '\n\n_Enviado desde FeriaControl_';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

// ═══════════════════════════════════════
//  FORM PRODUCTO
// ═══════════════════════════════════════
function openForm(id) {
  editId = id; fotoActual = null;
  var p = id ? productos.find(function(x) { return x.id === id; }) : null;
  document.getElementById('formTitulo').textContent = p ? 'Editar producto' : 'Nuevo producto';
  document.getElementById('fNombre').value = p ? p.nombre : '';
  document.getElementById('fPrecio').value = p ? p.precio : '';
  document.getElementById('fStock').value  = p ? p.stock  : '';
  document.getElementById('fAlerta').value = p ? (p.alerta || 2) : 2;
  fotoActual = p ? p.foto : null;
  refreshFotoUI();
  document.getElementById('formOv').classList.add('on');
  document.body.style.overflow = 'hidden';
  setTimeout(function() { document.getElementById('fNombre').focus(); }, 300);
}

function editarProducto(id) { openForm(id); }

function closeForm(e) {
  if (e && e.target !== document.getElementById('formOv')) return;
  document.getElementById('formOv').classList.remove('on');
  document.body.style.overflow = '';
  editId = null; fotoActual = null;
}

function onFoto(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX = 700, QUALITY = 0.78;
      var w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h*MAX/w); w = MAX; }
        else        { w = Math.round(w*MAX/h); h = MAX; }
      }
      var cv = document.createElement('canvas');
      cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      fotoActual = cv.toDataURL('image/jpeg', QUALITY);
      cv.width = 1; cv.height = 1;
      refreshFotoUI();
      toast('✅ Foto cargada');
    };
    img.onerror = function() { toast('⚠️ No se pudo cargar la foto'); };
    img.src = e.target.result;
  };
  reader.onerror = function() { toast('⚠️ Error al leer el archivo'); };
  reader.readAsDataURL(file);
  input.value = '';
}

function refreshFotoUI() {
  var el = document.getElementById('photoUI');
  if (!el) return;
  if (fotoActual) {
    el.innerHTML = '<div style="position:relative">' +
      '<img class="photo-preview-img" src="' + fotoActual + '"/>' +
      '<div style="position:absolute;bottom:8px;right:8px;background:rgba(10,20,40,.8);color:var(--orange);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px">✏️ Cambiar</div>' +
    '</div>';
  } else {
    el.innerHTML = '<div class="photo-pick-ph"><span>📷</span><p>Tocá para sacar o cargar una foto</p></div>';
  }
}

// emojis por defecto según nombre
var EMOJIS = { remera:'👕', pantalon:'👖', campera:'🧥', calzado:'👟', zapato:'👞', pollera:'👗', vestido:'👗', buzo:'🧥', chomba:'👕', short:'🩳', ropa:'🎽', electro:'📺', celular:'📱', hogar:'🏠', comida:'🥩', vegetal:'🥦', bebida:'🥤' };
function defaultEmoji(nombre) {
  var n = (nombre || '').toLowerCase();
  for (var k in EMOJIS) { if (n.includes(k)) return EMOJIS[k]; }
  return '📦';
}

function guardarProducto() {
  var nombre = document.getElementById('fNombre').value.trim();
  var precio = Number(document.getElementById('fPrecio').value) || 0;
  var stock  = Number(document.getElementById('fStock').value);
  var alerta = Number(document.getElementById('fAlerta').value) || 2;
  if (!nombre)   { toast('⚠️ Escribí el nombre del producto'); return; }
  if (!precio)   { toast('⚠️ Ingresá el precio'); return; }
  if (isNaN(stock) || document.getElementById('fStock').value === '') { toast('⚠️ Ingresá el stock inicial'); return; }

  var data = { id: editId || nextId(), nombre, precio, stock, alerta, foto: fotoActual, emoji: defaultEmoji(nombre) };

  if (editId) {
    var i = productos.findIndex(function(p) { return p.id === editId; });
    if (i >= 0) productos[i] = data;
  } else {
    productos.push(data);
  }

  saveProductos();
  closeForm();
  renderStock();
  renderVender();
  checkAlertas();
  toast(editId ? '✅ Producto actualizado' : '✅ ' + nombre + ' agregado');
}

// ═══════════════════════════════════════
//  BORRAR PRODUCTO
// ═══════════════════════════════════════
function confirmarBorrar(id) {
  var p = productos.find(function(x) { return x.id === id; });
  if (!p) return;
  document.getElementById('cfmTitulo').textContent = '¿Borrar producto?';
  document.getElementById('cfmMsg').textContent = '"' + p.nombre + '" se eliminará junto con su stock. Esta acción no se puede deshacer.';
  document.getElementById('cfmYes').textContent = 'Borrar';
  document.getElementById('cfmYes').onclick = function() {
    productos = productos.filter(function(x) { return x.id !== id; });
    saveProductos();
    closeCfm();
    renderStock();
    renderVender();
    checkAlertas();
    toast('🗑️ Producto eliminado');
  };
  document.getElementById('cfmOv').classList.add('on');
}

function closeCfm() { document.getElementById('cfmOv').classList.remove('on'); }

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
updateTotalDisplay();
checkAlertas();
renderVender();

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeForm(); closeCfm(); }
});
</script>
